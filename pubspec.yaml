name: devmob_edulycee
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

  # State management
  provider: ^6.1.2

  # State management (currently unused in lib/)
  flutter_bloc: ^9.1.1

  # File picker
  file_picker: ^8.0.0+1

  # Image processing (resize/compress) - pure Dart
  image: ^4.5.4

  # Cupertino icons (iOS style icons)
  cupertino_icons: ^1.0.8
  
  # PDF generation
  pdf: ^3.12.0
  printing: ^5.14.3

  # Equatable - pour la comparaison d'objets
  equatable: ^2.0.5

  # UUID - pour générer des identifiants uniques
  uuid: ^4.0.0

  # Shared preferences - pour sauvegarder les préférences utilisateur
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
